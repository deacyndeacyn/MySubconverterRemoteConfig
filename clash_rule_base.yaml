mixed-port: 7890
allow-lan: true
bind-address: "*"
mode: rule
log-level: info
ipv6: false
global-client-fingerprint: chrome
find-process-mode: "strict"
unified-delay: false
tcp-concurrent: true

tun:
  enable: true
  stack: mixed
  dns-hijack:
    - "any:53"
    - "tcp://any:53"
  auto-route: true
  auto-redirect: true
  auto-detect-interface: true
  strict-route: true

sniffer:
  enable: true
  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]
  skip-domain:
    - Mijia Cloud
    - dlg.io.mi.com
    - "+.push.apple.com"

dns:
  enable: true
  listen: 0.0.0.0:1053
  ipv6: false
  respect-rules: true
  
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  
  fake-ip-filter:
    - 'geosite:connectivity-check'
    - 'geosite:private'
    - '*.jianguoyun.com'  # 坚果云
    - 'weatherapi.market.xiaomi.com'  # 小米天气

  nameserver:
    - 223.5.5.5
    - 119.29.29.29
    # - system
  fallback:
    - https://dns.google/dns-query  # google
    - https://cloudflare-dns.com/dns-query  # cf
  fallback-filter:
    geoip: true
    geoip-code: CN
    ipcidr:
      - 240.0.0.0/4
  proxy-server-nameserver:
    - 223.5.5.5
    - 119.29.29.29
    # - system
  direct-nameserver:
    - 223.5.5.5
    - 119.29.29.29
    # - system
