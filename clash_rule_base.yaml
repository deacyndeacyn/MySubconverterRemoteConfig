mixed-port: 11778
ipv6: true
allow-lan: true
unified-delay: true
tcp-concurrent: true
log-level: warning
bind-address: "*"
find-process-mode: strict
keep-alive-interval: 15
keep-alive-idle: 15

profile:
  store-selected: true
  store-fake-ip: true

tun:
  enable: true
  stack: mixed
  auto-route: true
  strict-route: true
  auto-redirect: true
  auto-detect-interface: true
  dns-hijack: ["udp://any:53", "tcp://any:53"]

sniffer:
  enable: true
  force-dns-mapping: true
  parse-pure-ip: true
  override-destination: true
  sniff:
    TLS:
      ports: [443, 8443]
    HTTP:
      ports: [80, 8080-8888]
      override-destination: true
    QUIC:
      ports: [443, 8443]
  force-domain: 
    - "+.v2ex.com"
  skip-domain:
    - "Mijia Cloud"
    - "+.push.apple.com"
    - "dlg.io.mi.com"

ntp:
  enable: true
  write-to-system: false
  server: "ntp.aliyun.com"
  port: 123
  interval: 60
  
hosts:
  dns.alidns.com: [223.5.5.5, 223.6.6.6, 2400:3200::1, 2400:3200:baba::1]
  doh.pub: [1.12.12.12, 1.12.12.21, 120.53.53.53]
  dns.google: [8.8.8.8, 8.8.4.4, 2001:4860:4860::8888, 2001:4860:4860::8844]
  cloudflare-dns.com: [1.1.1.1, 1.0.0.1, 2606:4700:4700::1111, 2606:4700:4700::1001]

dns:
  enable: true
  listen: :1053
  ipv6: true
  respect-rules: true
  use-hosts: true
  use-system-hosts: true
  cache-algorithm: arc
  
  enhanced-mode: fake-ip
  fake-ip-range: "198.18.0.1/16"
  fake-ip-range6: "fc00::/18"
  
  fake-ip-filter:
    - "geosite:connectivity-check"
    - "geosite:private"
    - "*.lan"
    - "*.local"
    - "*.arpa"
    - "time.*.com"
    - "ntp.*.com"
    - "+.market.xiaomi.com"
    - "localhost.ptlogin2.qq.com"
    - "dns.msftncsi.com"
    - "www.msftconnecttest.com"
    - "*.msftconnecttest.com"
    - "*.msftncsi.com"      
    - "*.jianguoyun.com"  # 坚果云
    # - "www.bilibili.com"  # 哔哩哔哩
    - "+.infinitynewtab.com"  # infinity标签页

  # default-nameserver:
  #   - system
  #   - 114.114.114.114
  #   - 223.5.5.5
  
  nameserver-policy:
    "geosite:cn,private,apple":
      - https://dns.alidns.com/dns-query
      - https://doh.pub/dns-query
  nameserver:
    - https://dns.google/dns-query
    - https://cloudflare-dns.com/dns-query
  proxy-server-nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  direct-nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
