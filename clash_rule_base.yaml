mixed-port: 7890
allow-lan: true
bind-address: "*"
mode: rule
log-level: info
ipv6: false
global-client-fingerprint: chrome
find-process-mode: "strict"
unified-delay: false
tcp-concurrent: true

tun:
  enable: true
  stack: mixed
  dns-hijack:
    - "any:53"
    - "tcp://any:53"
  auto-route: true
  auto-redirect: true
  auto-detect-interface: true
  strict-route: true

sniffer:
  enable: true
  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]
  skip-domain:
    - Mijia Cloud
    - dlg.io.mi.com
    - "+.push.apple.com"

dns:
  enable: true
  listen: 0.0.0.0:1053
  ipv6: false
  respect-rules: true
  
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.0/16
  
  fake-ip-filter:
    - 'geosite:connectivity-check'
    - 'geosite:private'
    - "*.lan"
    - "*.local"
    - "*.arpa"
    - "time.*.com"
    - "ntp.*.com"
    - "+.market.xiaomi.com"
    - "localhost.ptlogin2.qq.com"
    
    - '*.jianguoyun.com'  # 坚果云
    # - 'weatherapi.market.xiaomi.com'  # 小米天气
    - 'bilibili.com'  # 哔哩哔哩

  default-nameserver:
    - 114.114.114.114
    - 223.5.5.5
  nameserver-policy:
    "geosite:cn,private,apple":
      - 114.114.114.114
      - 223.5.5.5
  nameserver:
    - "https://1.1.1.1/dns-query#RULES"
    - "https://8.8.8.8/dns-query#RULES"
  proxy-server-nameserver:
    - 114.114.114.114
    - 223.5.5.5
  direct-nameserver:
    - 114.114.114.114
    - 223.5.5.5
  direct-nameserver-follow-policy: true
